  /rewards/create-reward:
    post:
      tags:
        - Reward
      summary: Create a new reward
      description: |
        Creates a new reward with offer, contribution, service mapping, and audience targeting.

        **Important behavior & rules:**
        - Reward is created with `isActive = true`
        - `endDate` defaults to **2099-01-01** if not provided
        - OWNER must be `"SHINR"` or `"VENDOR"`
        - If `vendorId` is provided, it must be a valid active vendor
        - Offer, contribution, services, and audiences are created as separate mappings
        - Audience mappings are created **only if `targetAudienceIds` is provided**
        - Dates must be valid date-time strings

        ### Conditional Rules (Validated in Backend)
        - `percentage` is required only when `offerType = PERCENTAGE | CASHBACK`
        - `shinrPercentage` and `vendorPercentage` are required only when `contribution = SHARE`
        - `maxUsagePeriodValue` is required unless `maxUsagePeriod = OVERALL`
        - `endDate` must be greater than `startDate`
        - `serviceCategoryIds` must reference active services
        - `targetAudienceIds` must reference active target audience configs

        ### File Upload (Optional)
        - **selectedCustomer** → required when MANUAL user selection is used
        - **locationFile** → required when MANUAL location targeting is used

        This endpoint accepts **multipart/form-data**.

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - owner
                - title
                - sideText
                - summary
                - description
                - rewardCategoryId
                - serviceCategoryIds
                - displayCouponPage
                - displayVendorPage
                - offerType
                - maxDiscountAmount
                - minOrderValue
                - codeGeneration
                - priority
                - startDate
                - totalGrabLimit
                - contribution
                - maxUsage
                - maxUsagePeriod
                - status
              properties:
                owner:
                  type: string
                  enum: [SHINR, VENDOR]
                  example: SHINR

                vendorId:
                  type: integer
                  nullable: true
                  example: 5
                  description: Required only when owner is VENDOR

                title:
                  type: string
                  example: New Year Cashback

                sideText:
                  type: string
                  example: Limited period offer

                summary:
                  type: string
                  example: Get cashback on selected services

                description:
                  type: string
                  example: Flat cashback for first-time users

                rewardCategoryId:
                  type: integer
                  example: 2

                serviceCategoryIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 3, 5]
                  description: Must reference active services

                displayCouponPage:
                  type: boolean
                  example: true

                displayVendorPage:
                  type: boolean
                  example: false

                offerType:
                  type: string
                  enum: [PERCENTAGE, AMOUNT, CASHBACK]
                  example: PERCENTAGE

                percentage:
                  type: number
                  nullable: true
                  example: 20
                  description: Required when offerType is PERCENTAGE or CASHBACK

                maxDiscountAmount:
                  type: number
                  example: 500

                minOrderValue:
                  type: number
                  example: 1000

                codeGeneration:
                  type: string
                  example: AUTO

                priority:
                  type: integer
                  example: 1

                targetAudienceIds:
                  type: array
                  items:
                    type: integer
                  example: [2, 4]
                  description: Must reference active reward audience configs

                startDate:
                  type: string
                  format: date-time
                  example: "2026-01-01T00:00:00Z"

                endDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: "2026-12-31T23:59:59Z"
                  description: Defaults to 2099-01-01 if not provided

                totalGrabLimit:
                  type: integer
                  example: 1000

                contribution:
                  type: string
                  enum: [PLATFORM, VENDOR, SHARE]
                  example: SHARE

                shinrPercentage:
                  type: number
                  nullable: true
                  example: 50
                  description: Required when contribution is SHARE

                vendorPercentage:
                  type: number
                  nullable: true
                  example: 50
                  description: Required when contribution is SHARE

                maxUsage:
                  type: integer
                  example: 1

                maxUsagePeriod:
                  type: string
                  enum: [HOUR, DAY, MONTH, OVERALL]
                  example: MONTH

                maxUsagePeriodValue:
                  type: integer
                  nullable: true
                  example: 3
                  description: Required unless maxUsagePeriod is OVERALL

                status:
                  type: string
                  enum: [DRAFT, ACTIVE]
                  example: DRAFT

                selectedCustomer:
                  type: string
                  format: binary
                  description: Required only for Selected_Customer in  MANUAL audience targeting.CSV/Excel file for manual user selection

                locationFile:
                  type: string
                  format: binary
                  description: Required only for location-based in MANUAL audience targeting.CSV/Excel file for manual location targeting

      responses:
        "200":
          description: Reward created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
