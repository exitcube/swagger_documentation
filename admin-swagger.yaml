                example:
                  success: true
                  message: "Customers fetched successfully"
                  data:
                    items:
                      - id: 1
                        name: "John Doe"
                        email: "john@example.com"
                        mobile: "9876543210"
                        lastActive: "2025-03-01T10:15:30Z"
                        registeredOn: "2024-12-10T08:00:00Z"
                        isBlocked: false
                      - id: 2
                        name: "Jane Smith"
                        email: "jane@example.com"
                        mobile: "9123456780"
                        lastActive: "2025-03-01T14:20:10Z"
                        registeredOn: "2024-11-15T09:30:00Z"
                        isBlocked: true
                    total: 50
                    page: 1
                    limit: 10
                    totalPages: 5

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Last active must be a valid date"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to fetch customers"

  /customer/single-customer/{id}:
    get:
      tags:
        - Customer
      summary: Get single customer
      description: |
        Fetches details of a single active customer by ID.

        **Important rules & behavior:**
        - Only users with `isActive = true` can be fetched
        - If customer does not exist → returns 404 "User not found"

      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          description: ID of the customer
          schema:
            type: integer
            example: 1

      responses:
        "200":
          description: Customer fetched successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Customer fetched successfully"
                  data:
                    id: 1
                    name: "John Doe"
                    email: "john@example.com"
                    mobile: "9876543210"
                    lastActive: "2025-03-01T10:15:30Z"
                    registeredOn: "2024-12-10T08:00:00Z"

        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User not found"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to fetch user"

  /customer/block-customer/{id}:
    post:
      tags:
        - Customer
      summary: Block a customer
      description: |
        Blocks an active customer.

        **Important rules & behavior:**
        - Only users with `isActive = true` can be blocked
        - If customer does not exist → returns 404 "User not found"
        - If customer is already blocked → returns 400 "User is already blocked"
        - Sets `isBlocked = true` after successful operation

      security:
        - bearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          description: ID of the customer to block
          schema:
            type: integer
            example: 1

      responses:
        "200":
          description: Customer blocked successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Customer blocked successfully"
                  data:
                    updated: true

        "400":
          description: Customer is already blocked
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User is already blocked"

        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "User not found"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to block user"

  /enquiry/create-enquiry:
    post:
      tags:
        - Public
      summary: Create a new enquiry
      description: |
        Creates a new enquiry with an owner and one or more organizations.

        **Important rules & behavior:**
        - This is a **public section**, used on the website
        - Owner must have `name` and `mobile` (email optional)
        - Organizations must have at least one entry
        - Each organization must have a unique mobile number
        - If any organization mobile already exists → request is rejected
        - Supports multiple organizations per enquiry

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - owner
                - organizations
              properties:
                owner:
                  type: object
                  required:
                    - name
                    - mobile
                  properties:
                    name:
                      type: string
                      example: "John Doe"
                    email:
                      type: string
                      format: email
                      example: "john@example.com"
                    mobile:
                      type: string
                      example: "9876543210"

                organizations:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - buisnessName
                      - mobile
                    properties:
                      buisnessName:
                        type: string
                        example: "Acme Corp"
                      email:
                        type: string
                        format: email
                        example: "info@acme.com"
                      mobile:
                        type: string
                        example: "9123456780"
                      address:
                        type: string
                        example: "123 Main Street"
                      country:
                        type: string
                        example: "India"
                      city:
                        type: string
                        example: "Bangalore"
                      state:
                        type: string
                        example: "Karnataka"
                      pinCode:
                        type: string
                        example: "560001"
                      businessType:
                        type: array
                        items:
                          type: string
                        example: ["Retail", "Wholesale"]
                      buisnessExperience:
                        type: string
                        example: "5 years"
                      additionalInfo:
                        type: string
                        example: "Looking for collaboration"

      responses:
        "200":
          description: Enquiry created successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Enquiry created successfully"
                  data:
                    ownerId: 101
                    organizationIds: [201, 202]

        "400":
          description: Validation or business rule error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Organization mobile numbers must be unique"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to create enquiry"




