  /admin/generate-refreshToken:
    post:
      tags:
        - Admin
      summary: Refresh admin access token
      description: |
        Generates a new access token and refresh token for an active admin user.

        **Important rules & behavior:**
        - Requires a valid `refreshToken` in request body
        - Validates:
          - Admin exists and is active
          - Refresh token exists, matches, and is in ACTIVE state
        - Marks old refresh token as **USED** and inactive
        - Creates a new refresh token record and generates:
          - `accessToken` → short-lived
          - `refreshToken` → long-lived (default expiry 60 days)
        - Returns both tokens in response
        - If validation fails → returns 400 with appropriate error

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  description: "Valid admin refresh token"

      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Token refreshed successfully."
                  data:
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refreshToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

        "400":
          description: Validation or token error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid refresh token."

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to refresh token. Please login again."

