  /service/create-service:
    post:
      tags:
        - Service
      summary: Create a new service
      description: |
        Creates a new service with image upload and display configuration.

        **Important rules & behavior:**
        - Service is created with:
          - `status` → **ACTIVE**
          - `isActive` → **true**
        - `displaySequence` must be greater than or equal to 1
        - `name` and `displayName` must be maximum 100 characters
        - `description` can be empty or null
        - Image is mandatory

        ### Image Rules (Mandatory)
        - Supported formats: PNG, JPG
        - Required size: **193 × 239 px**
        - Max size: **5 MB**
        - Service image is required

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - displayName
                - displaySequence
                - serviceImage
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: "CAR_WASH"

                displayName:
                  type: string
                  maxLength: 100
                  example: "Car Wash Service"

                description:
                  type: string
                  example: "Complete exterior and interior car cleaning service"
                  description: Can be empty or null

                displaySequence:
                  type: integer
                  minimum: 1
                  example: 1
                  description: Determines display order of the service

                serviceImage:
                  type: string
                  format: binary
                  description: |
                    Required service image.
                    Must be PNG/JPG, max 5MB, exactly 193x239 px.

      responses:
        "200":
          description: Service created successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Service created successfully"
                  data:
                    id: 12
                    name: "CAR_WASH"
                    displayName: "Car Wash Service"
                    description: "Complete exterior and interior cleaning"
                    displaySequence: 1
                    status: "ACTIVE"
                    isActive: true
                    createdBy: 5

        "400":
          description: Invalid request or validation error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Image must be exactly 193x239 pixels"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to ADD service"


  /service/update-service:
    put:
      tags:
        - Service
      summary: Update an existing service
      description: |
        Updates an existing active service.

        **Important rules & behavior:**
        - `serviceId` is required
        - Only services with `isActive = true` can be updated
        - If service is not found → returns "Invalid service id"
        - All fields except `serviceId` are optional
        - If `serviceImage` is provided:
          - Old image will be deactivated
          - New image will be uploaded and linked
        - `displaySequence` must be greater than or equal to 1
        - `status` must be either:
          - **DRAFT**
          - **ACTIVE**

        ### Image Rules (If Provided)
        - Supported formats: PNG, JPG
        - Required size: **193 × 239 px**
        - Max size: **5 MB**

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - serviceId
              properties:
                serviceId:
                  type: integer
                  example: 12

                displayName:
                  type: string
                  maxLength: 100
                  example: "Premium Car Wash Service"

                description:
                  type: string
                  example: "Updated description for service"
                  description: Can be empty or null

                displaySequence:
                  type: integer
                  minimum: 1
                  example: 2

                status:
                  type: string
                  enum: ["DRAFT", "ACTIVE"]
                  example: "ACTIVE"

                serviceImage:
                  type: string
                  format: binary
                  description: |
                    Optional service image.
                    Must be PNG/JPG, max 5MB, exactly 193x239 px.

      responses:
        "200":
          description: Service updated successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Service updated successfully"
                  data:
                    updated: true

        "400":
          description: Invalid request or validation error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid service id"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to Update service"

