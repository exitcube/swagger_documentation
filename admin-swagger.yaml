  /rewards/update-reward:
    put:
      tags:
        - Reward
      summary: Update an existing reward
      description: |
        Updates an existing reward (partial update supported).

        ### Validation & Conditional Rules
        - **rewardId** is mandatory
        - All other fields are optional
        - **vendorId** is required when `owner = VENDOR`
        - **percentage** is required when `offerType = CASHBACK | PERCENTAGE`
        - **shinrPercentage & vendorPercentage** are required when `contribution = SHARE`
        - **maxUsagePeriodValue** is required unless `maxUsagePeriod = OVERALL`
        - **endDate** must be greater than `startDate`
        - **serviceCategoryIds** must reference active services
        - **targetAudienceIds** must reference active target audience configs
        - **status** must be one of: `DRAFT`, `ACTIVE`

        ### File Upload (Optional)
        - **selectedCustomer** → required when MANUAL user selection is used
        - **locationFile** → required when MANUAL location targeting is used

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - rewardId
              properties:

                rewardId:
                  type: integer
                  example: 12

                owner:
                  type: string
                  enum: [SHINR, VENDOR]
                  example: SHINR

                vendorId:
                  type: integer
                  example: 5
                  description: Required when owner is VENDOR

                title:
                  type: string
                  example: Updated Cashback Offer

                sideText:
                  type: string
                  example: Limited period only

                summary:
                  type: string
                  example: Updated reward summary

                description:
                  type: string
                  example: Updated reward description

                rewardCategoryId:
                  type: integer
                  example: 3

                serviceCategoryIds:
                  type: array
                  items:
                    type: integer
                  example: [2, 4]

                displayCouponPage:
                  type: boolean
                  example: true

                displayVendorPage:
                  type: boolean
                  example: false

                offerType:
                  type: string
                  enum: [PERCENTAGE, AMOUNT, CASHBACK]
                  example: CASHBACK

                percentage:
                  type: number
                  example: 10
                  description: Required when offerType is CASHBACK or PERCENTAGE

                maxDiscountAmount:
                  type: number
                  example: 300

                minOrderValue:
                  type: number
                  example: 800

                codeGeneration:
                  type: string
                  example: AUTO

                priority:
                  type: integer
                  example: 2

                targetAudienceIds:
                  type: array
                  items:
                    type: integer
                  example: [1, 3]

                startDate:
                  type: string
                  format: date-time
                  example: "2026-02-01T00:00:00Z"

                endDate:
                  type: string
                  format: date-time
                  example: "2026-06-30T23:59:59Z"

                totalGrabLimit:
                  type: integer
                  example: 500

                contribution:
                  type: string
                  enum: [PLATFORM, VENDOR, SHARE]
                  example: SHARE

                shinrPercentage:
                  type: number
                  example: 60
                  description: Required when contribution is SHARE

                vendorPercentage:
                  type: number
                  example: 40
                  description: Required when contribution is SHARE

                maxUsage:
                  type: integer
                  example: 1

                maxUsagePeriod:
                  type: string
                  enum: [HOUR, DAY, MONTH, OVERALL]
                  example: MONTH

                maxUsagePeriodValue:
                  type: integer
                  example: 6
                  description: Required unless maxUsagePeriod is OVERALL

                status:
                  type: string
                  enum: [DRAFT, ACTIVE]
                  example: ACTIVE

                selectedCustomer:
                  type: string
                  format: binary
                  description: Required only for Selected_Customer in MANUAL audience targeting.CSV/Excel file for manual user selection

                locationFile:
                  type: string
                  format: binary
                  description: Required only for location-based in MANUAL audience targeting.CSV/Excel file for manual location targeting

      responses:
        "200":
          description: Reward updated successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: reward Updated Succefully

        "400":
          description: Validation or business rule error
          content:
            application/json:
              examples:
                RewardNotFound:
                  value:
                    success: false
                    message: the given reward is not found
                VendorMissing:
                  value:
                    success: false
                    message: vendorId is required when owner is vendor
                PercentageMissing:
                  value:
                    success: false
                    message: Percentage is required when offerType is Cashback or Percentage
                ContributionMismatch:
                  value:
                    success: false
                    message: SHINR Percentage is required when contribution is SHARE

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

