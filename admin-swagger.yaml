openapi: 3.0.0
info:
  title: Shinr User Management API
  version: "1.0.0"
  description: API documentation for login and OTP verification

servers:
  - url: https://shinr-user-mgmt.onrender.com/

tags:
  - name: Public
    description: This is a **section**, used on the website.  
  - name: Vehicle
    description: Vehicle-related endpoints for fetching car details
  - name: Banner
    description: Banner management endpoints
  - name: Reward
    description: Reward management endpoints
  - name: Admin
    description: Admin authentication and management endpoints
  - name: Vendor
    description: Vendor management endpoints
  - name: Service
    description: Service management endpoints    


paths:

          
  /banner/get-categories:
    get:
      tags:
        - Banner
      summary: Get banner categories with search and pagination
      description: |
        Returns a paginated list of active banner categories.

        - Supports optional search by category display name
        - Only active categories are returned
        - Uses standard paginated response format

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Optional search term for filtering categories by display name
          example: Home

        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number

        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of categories per page

      responses:
        "200":
          description: Categories fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Home Banner

                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 5
                      pages:
                        type: integer
                        example: 1
                      hasNext:
                        type: boolean
                        example: false
                      hasPrev:
                        type: boolean
                        example: false

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"
          
  /banner/get-status:
    get:
      tags:
        - Banner
      summary: Get banner status and review status
      description: Returns the list of banner statuses and review statuses.
      security:
        - bearerAuth: []   # Admin access token required
  
  
      responses:
        "200":
          description: Status and review status list fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessBannerStatusResponse"
  
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  
        "500":
          $ref: "#/components/responses/InternalServerError"
          
  /admin/login:
    post:
      tags:
        - Admin
      summary: Admin Login
      description: Authenticates an admin user and returns access & refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - password
              properties:
                userName:
                  type: string
                  example: "shayizz400"
                password:
                  type: string
                  example: "shayiz123"
  
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
  
        "400":
          $ref: '#/components/responses/BadRequestError'
  
        "401":
          $ref: '#/components/responses/UnauthorizedError'
  
        "500":
          $ref: '#/components/responses/InternalServerError'

  /banner/getTargetAudience:
    get:
      tags:
        - Banner
      summary: Get Target Audience Options
      description: |
        Returns the list of target audience categories and their items
        used in banner configuration.

        ### Notes
        - Target audiences are grouped by **category**
        - **MANUAL** category always requires additional input
          - `isFile = true`
        - **EVERYONE** and **SPECIAL_RULE** do not require files

      security:
        - bearerAuth: []

      responses:
        "200":
          description: Target audience options fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                          example: MANUAL

                        displayText:
                          type: string
                          example: Manual

                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 9

                              displayText:
                                type: string
                                example: Selected Customer

                              value:
                                type: string
                                example: SELECTED_CUSTOMER

                              isFile:
                                type: boolean
                                example: true
                                description: |
                                  Indicates whether this target audience
                                  requires additional input configuration

                  message:
                    type: string
                    example: Target audience options fetched successfully

              example:
                success: true
                data:
                  - category: MANUAL
                    displayText: Manual
                    items:
                      - id: 2
                        displayText: Selected Customer
                        value: SELECTED_CUSTOMER
                        isFile: true

                      - id: 3
                        displayText: Location Based
                        value: LOCATION_BASED
                        isFile: true

                  - category: EVERYONE
                    displayText: Everyone
                    items:
                      - id: 1
                        displayText: Everyone
                        value: EVERYONE
                        isFile: false

                  - category: SPECIAL_RULE
                    displayText: Special Rules
                    items:
                      - id: 4
                        displayText: New User
                        value: NEW_USER
                        isFile: false

                      - id: 5
                        displayText: First Car Wash
                        value: FIRST_CAR_WASH
                        isFile: false

                      - id: 6
                        displayText: First Any Service
                        value: FIRST_ANY_SERVICE
                        isFile: false

                message: Target audience options fetched successfully

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"
          
  /banner/update-banner-category:
    put:
      tags:
        - Banner
      summary: Update Banner Category Display Text
      description: |
        Updates the display text of an existing banner category.

        ### Validation Rules
        - **id** is required and must be a string
        - **updatingText** is required and must be a string

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - updatingText
              properties:
                id:
                  type: string
                  description: Banner category ID
                  example: "3"

                updatingText:
                  type: string
                  description: Updated display text for the banner category
                  example: "New Category Name"

      responses:
        "200":
          description: Banner category updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Banner category updated successfully
                  data:
                    type: object
                    properties:
                      updated:
                        type: integer
                        example: 1

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"
          
  /banner/delete-banner-category:
    delete:
      tags:
        - Banner
      summary: Delete banner category
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
          description: Category ID to delete
      responses:
        "200":
          description: Banner category deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Banner category deleted successfully
                  data:
                    type: object
                    properties:
                      deleted:
                        type: integer
                        example: 1
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"


  /banner/create-banner:
    post:
      tags:
        - Banner
      summary: Create a new banner
      description: |
        Creates a new banner with image upload, scheduling, priority, and audience targeting.

        **Important rules & behavior:**
        - Banner is created with:
          - `status` → **DRAFT**
          - `reviewStatus` → **PENDING**
        - OWNER must be `"SHINR"` or `"VENDOR"`
        - If `vendorId` is provided, it must be a valid active vendor
        - `startTime` is required
        - `endTime` defaults to **2099-01-01** if not provided
        - Audience mappings are created **only if `targetAudienceId` is provided**
        - Dates must be valid date-time strings with timezone

        ### Image Rules (Mandatory)
        - Supported formats: PNG, JPG
        - Required size: **272 × 230 px**
        - Max size: **5 MB**
        - Banner image is **required**

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - categoryId
                - owner
                - priority
                - startTime
                - bannerImage
              properties:
                title:
                  type: string
                  example: "Winter Festival Offer"

                categoryId:
                  type: integer
                  example: 3

                owner:
                  type: string
                  enum: ["SHINR", "VENDOR"]
                  example: "SHINR"

                vendorId:
                  type: integer
                  example: 12
                  description: Required only when owner is VENDOR

                targetAudienceId:
                  type: array
                  items:
                    type: integer
                  example: [1, 3]
                  description: Audience configuration IDs

                targetValue:
                  type: string
                  example: "ALL_USERS"

                priority:
                  type: integer
                  example: 1
                  description: Display sequence of the banner

                startTime:
                  type: string
                  format: date-time
                  example: "2025-01-10T00:00:00+05:30"

                endTime:
                  type: string
                  format: date-time
                  example: "2025-01-20T23:59:59+05:30"
                  description: Defaults to 2099-01-01 if not provided

                homePageView:
                  type: boolean
                  example: true
                  description: Whether banner is shown on home page

                bannerImage:
                  type: string
                  format: binary
                  description: |
                    Required banner image.
                    Must be PNG/JPG, max 5MB, exactly 272x230 px.

                selectedCustomer:
                  type: string
                  format: binary
                  description: |
                    File for manually selected users.
                    Required only if selected-user audience config is used.

                locationFile:
                  type: string
                  format: binary
                  description: |
                    File for manual location-based targeting.
                    Required only if location-based audience config is used.

      responses:
        "200":
          description: Banner created successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Banner Created Successfully"
                  data:
                    id: 101
                    title: "Winter Festival Offer"
                    categoryId: 3
                    owner: "SHINR"
                    vendorId: 12
                    priority: 1
                    startTime: "2025-01-10T00:00:00+05:30"
                    endTime: "2099-01-01T00:00:00Z"
                    status: "DRAFT"
                    reviewStatus: "PENDING"

        "400":
          description: Invalid request or business rule violation
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Image must be exactly 272 × 230 pixels."

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to create banners"

  /banner/update-banner:
    put:
      tags:
        - Banner
      summary: Update banner details
      description: |
        Updates an existing banner. Only the fields provided will be updated.

        **Important rules & behavior:**
        - **bannerId is required**
        - OWNER must be `"SHINR"` or `"VENDOR"`
        - If `vendorId` is provided, it must be a valid active vendor
        - Expired banners cannot be edited
        - Audience mappings will be replaced **only if `targetAudienceId` is provided**
        - Dates (`startTime`, `endTime`) must be valid date-time strings with timezone

        ### Image Rules (if uploading a new banner image)
        - Supported formats: PNG, JPG
        - Required size: **272 × 230 px**
        - Max size: **5 MB**

        This endpoint accepts **multipart/form-data**.

      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - bannerId
              properties:
                bannerId:
                  type: integer
                  example: 12
                  description: ID of the banner to update

                title:
                  type: string
                  example: "Diwali Offer"

                categoryId:
                  type: integer
                  example: 3

                owner:
                  type: string
                  enum: ["SHINR", "VENDOR"]
                  example: "VENDOR"

                vendorId:
                  type: integer
                  example: 5
                  description: Required only when owner is VENDOR

                targetAudienceId:
                  type: array
                  items:
                    type: integer
                  example: [1, 2, 5]
                  description: Audience configuration IDs

                targetValue:
                  type: string
                  example: "MAHARASHTRA"

                priority:
                  type: integer
                  example: 1
                  description: Display sequence of the banner

                startTime:
                  type: string
                  format: date-time
                  example: "2025-12-04T00:00:00+05:30"

                endTime:
                  type: string
                  format: date-time
                  example: "2025-12-10T23:59:59+05:30"

                homePageView:
                  type: boolean
                  example: true

                bannerImage:
                  type: string
                  format: binary
                  description: |
                    Optional banner image.
                    Must be PNG/JPG, max 5MB, exactly 272x230 px.

                selectedCustomer:
                  type: string
                  format: binary
                  description: |
                    File for manually selected users.
                    Required only if selected-user audience config is used.

                locationFile:
                  type: string
                  format: binary
                  description: |
                    File for manual location-based targeting.
                    Required only if location-based audience config is used.

      responses:
        "200":
          description: Banner updated successfully
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "Banner updated successfully"
                  data:
                    updated: true

        "400":
          description: Invalid request or business rule violation
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Invalid banner id"

        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Unauthorized"

        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "Failed to update banners"

  /banner/approve-banner:
    post:
      tags:
        - Banner
      summary: Approve or reject a banner
      description: |
        Allows an admin to approve or reject a banner.

        - `bannerId` and `action` are required.
        - `action` must be either **APPROVE** or **REJECT**.
        - If `action = REJECT`, backend expects `rejectReason`.
        - Admin cannot approve/reject their own banner.
        - Banner must be in **PENDING** state and **DRAFT** status.

      security:
        - bearerAuth: []   # Admin access token required

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bannerId:
                  type: number
                  example: 12
                  description: "Required. Must be a valid number."
                action:
                  type: string
                  enum: ["APPROVE", "REJECT"]
                  example: "REJECT"
                  description: "Required. Must be either APPROVE or REJECT."
                rejectReason:
                  type: string
                  example: "Incorrect information in banner."
                  nullable: true
                  description: "Required only when action = REJECT."

              required:
                - bannerId
                - action

      responses:
        "200":
          description: Banner approval or rejection completed.
          content:
            application/json:
              example:
                success: true
                message: "Banner Approved"
                data:
                  approved: true

        "400":
          description: Validation or business rule failure.
          content:
            application/json:
              example:
                success: false
                message: "bannerId is required"

        "500":
          description: Server error
          content:
            application/json:
              example:
                success: false
                message: "Failed to Approve banners"

  /banner/getbanners:
    post:
      tags:
        - Banner
      summary: Get banner list with filters, search, and pagination
      description: |
        Fetch banners with advanced filtering and pagination.

        - Search works on banner title, vendor name, vendor code, and category
        - Vendor filter is allowed only when owner is VENDOR
        - Date filters support single date or date range
        - Partial filters are supported

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
            minLength: 3
          description: |
            Search term (min 3 characters).
            Searches across:
            - Banner title
            - Vendor name
            - Vendor code
            - Banner category

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: array
                  items:
                    type: string
                    example: ACTIVE

                reviewStatus:
                  type: array
                  items:
                    type: string
                    example: APPROVED

                owner:
                  type: string
                  example: VENDOR

                categoryId:
                  type: array
                  items:
                    type: integer
                    example: 2

                vendorId:
                  type: array
                  items:
                    type: integer
                    example: 15
                  description: Required only when owner is VENDOR

                startTime:
                  type: string
                  format: date-time
                  example: "2026-01-01T00:00:00Z"

                endTime:
                  type: string
                  format: date-time
                  example: "2026-01-31T23:59:59Z"

                sortOrder:
                  type: string
                  enum: [ASC, DESC]
                  default: ASC
                  example: ASC

                page:
                  type: integer
                  minimum: 1
                  default: 1
                  example: 1

                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 10
                  example: 10

      responses:
        "200":
          description: Banners fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Data fetched successfully
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 12
                        title:
                          type: string
                          example: Republic Day Offer
                        category:
                          type: string
                          example: Festival
                        reviewStatus:
                          type: string
                          example: APPROVED
                        status:
                          type: string
                          example: ACTIVE
                        owner:
                          type: string
                          example: VENDOR
                        vendor:
                          type: string
                          example: Amazon
                        displaySequence:
                          type: integer
                          example: 1
                        startTime:
                          type: string
                          format: date-time
                          example: "2026-01-01T00:00:00Z"
                        endTime:
                          type: string
                          format: date-time
                          example: "2026-01-31T23:59:59Z"

                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 120
                      pages:
                        type: integer
                        example: 12
                      hasNext:
                        type: boolean
                        example: true
                      hasPrev:
                        type: boolean
                        example: false

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

  /admin/list-adminusers-roles:
    get:
      summary: Get list of admin roles
      tags:
        - Admin
      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            example: 1

        - in: query
          name: limit
          required: false
          schema:
            type: integer
            example: 10

      responses:
        "200":
          description: Admin roles fetched successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin roles fetched successfully
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          type: object
                          properties:
                            displayName:
                              type: string
                              example: Super Admin
                            value:
                              type: string
                              example: SUPER_ADMIN
                      total:
                        type: integer
                        example: 3
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10

        "400":
          description: Failed to fetch admin roles.
        "401":
          description: Unauthorized access.


  /admin/createadminuser:
    post:
      summary: Create a new admin user
      description: |
        Creates a new admin user. **Access restricted:** Only adminusers with the `SUPER_ADMIN` role can perform this action.
      tags:
        - Admin
      security:
        - bearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userName
                - newRole
                - email
                - joiningDate
              properties:
                userName:
                  type: string
                  minLength: 3
                  example: "Rohit Sharma"
                newRole:
                  type: string
                  description: Must be one of the allowed admin roles. Only SUPER_ADMIN can assign roles.
                  enum:
                    - ADMIN
                    - SUPER_ADMIN
                    - EMPLOYEE
                  example: "ADMIN"
                email:
                  type: string
                  format: email
                  example: "rohit.sharma@shinr.in"
                joiningDate:
                  type: string
                  format: date
                  description: ISO date format
                  example: "2025-02-10"

      responses:
        "200":
          description: Admin user created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Admin user created successfully
                  data:
                    type: object
                    properties:
                      empCode:
                        type: string
                        example: "SHINR15210205"

        "400":
          description: Validation failed or invalid role
        "403":
          description: Forbidden - Only SUPER_ADMIN can access this resource
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: You are not allowed to create admin users
                  code:
                    type: string
                    example: FORBIDDEN
                  statusCode:
                    type: number
                    example: 403
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-12-10T10:30:00.000Z"
                  path:
                    type: string
                    example: /admin/create-admin-user
                  method:
                    type: string
                    example: POST

        "500":
          description: Server error

  /admin/edit-adminuser:
    put:
      summary: Edit Admin User
      description: Updates admin user details using admin ID.


        - `empCode` cannot be updated.
        - Only `SUPER_ADMIN` is allowed to edit admin user details.
        - Only editable fields are `userName`, `newRole`, `email`, and `joiningDate`.
      tags:
        - Admin
      security:
        - bearerAuth: []   # Admin access required

      parameters:
        - name: adminId
          in: query
          required: true
          schema:
            type: integer
          description: ID of the admin user to update

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                  example: "ABC"
                newRole:
                  type: string
                  example: "ADMIN"
                email:
                  type: string
                  format: email
                  example: "abc123@example.com"
                joiningDate:
                  type: string
                  format: date
                  example: "2025-01-10"

      responses:
