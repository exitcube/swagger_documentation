    post:
      tags:
        - Reward
      summary: List rewards
      description: |
        Fetch a paginated list of rewards with optional filters.

        - Supports search across title, side text, vendor name/code, and category
        - All filters are optional
        - Multiple filters accept **arrays**
        - Uses constant-based enum values
        - Only **active** rewards are returned

        ### Array-based Filters
        - **status[]** → RewardStatus: DRAFT, ACTIVE, EXPIRED
        - **categoryId[]** → Reward category IDs
        - **serviceId[]** → Service IDs
        - **vendorId[]** → Vendor IDs (allowed only when owner = VENDOR)

      security:
        - bearerAuth: []

      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
            minLength: 3
          description: Search keyword (minimum 3 characters)
          example: off

      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: array
                  items:
                    type: string
                    enum: [DRAFT, ACTIVE, EXPIRED]
                  example: [DRAFT]

                owner:
                  type: string
                  enum: [SHINR, VENDOR]
                  example: VENDOR

                vendorId:
                  type: array
                  items:
                    type: integer
                  example: [5, 8]
                  description: Allowed only when owner is VENDOR

                categoryId:
                  type: array
                  items:
                    type: integer
                  example: [1, 3]

                serviceId:
                  type: array
                  items:
                    type: integer
                  example: [2, 4]

                startTime:
                  type: string
                  format: date-time
                  example: "2026-01-01T00:00:00Z"

                endTime:
                  type: string
                  format: date-time
                  example: "2026-12-31T23:59:59Z"

                page:
                  type: integer
                  minimum: 1
                  example: 1

                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  example: 10

      responses:
        "200":
          description: Rewards fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 20

                        title:
                          type: string
                          example: 50% off

                        category:
                          type: object
                          properties:
                            displayText:
                              type: string
                              example: comeBackUser

                        owner:
                          type: string
                          enum: [SHINR, VENDOR]
                          example: VENDOR

                        vendor:
                          type: object
                          nullable: true
                          properties:
                            name:
                              type: string
                              example: adddu

                        startDate:
                          type: string
                          format: date-time
                          example: "2024-12-31T18:30:00.000Z"

                        endDate:
                          type: string
                          format: date-time
                          example: "2025-01-31T18:29:59.000Z"

                        status:
                          type: string
                          enum: [DRAFT, ACTIVE, EXPIRED]
                          example: DRAFT

                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 5
                      pages:
                        type: integer
                        example: 1
                      hasNext:
                        type: boolean
                        example: false
                      hasPrev:
                        type: boolean
                        example: false

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalServerError"

